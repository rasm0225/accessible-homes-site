<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <!-- Circle background -->
  <circle cx="55" cy="60" r="52" fill="none" stroke="#C0652A" stroke-width="5"/>
  <circle cx="55" cy="60" r="47" fill="#F5DFC6"/>

  <!-- House body -->
  <rect x="30" y="48" width="50" height="35" fill="#D4792E" rx="1"/>

  <!-- House roof (triangle) -->
  <polygon points="55,18 24,50 86,50" fill="#D4792E"/>

  <!-- Green arrow -->
  <g transform="translate(55, 72)">
    <!-- Arrow shaft -->
    <rect x="-9" y="-18" width="18" height="38" fill="#7DC242" rx="1"/>
    <!-- Arrow head -->
    <polygon points="0,-30 -15.5,-14 15.5,-14" fill="#7DC242"/>
  </g>

  <!-- Text: Accessible Homes -->
  <text x="118" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#C0652A" letter-spacing="0.5">Accessible Homes</text>

  <!-- Text: Serving people of all abilities -->
  <text x="120" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#888888" letter-spacing="0.3" font-style="italic">Serving people of all abilities</text>
</svg>